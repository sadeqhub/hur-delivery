<!DOCTYPE html>

<style>
        .font-tajawal { font-family: 'Tajawal', sans-serif; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface overflow-hidden h-screen">
<!-- Top Navigation Anchor (Based on JSON) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-stone-950/80 backdrop-blur-lg shadow-sm shadow-teal-900/5">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<button class="active:scale-95 transition-transform text-teal-700">
<span class="material-symbols-outlined text-2xl">menu</span>
</button>
<h1 class="text-2xl font-black text-teal-800 tracking-tighter">Hur Delivery</h1>
</div>
<div class="flex items-center gap-4">
<div class="bg-primary/10 px-3 py-1 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-manrope text-xs font-bold text-primary">PREMIUM DRIVER</span>
</div>
<div class="w-10 h-10 rounded-full border-2 border-primary-fixed overflow-hidden">
<img alt="Driver Profile" class="w-full h-full object-cover" data-alt="professional portrait of a friendly man in a sharp delivery uniform, warm studio lighting, clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5MET57U8q35RrRc_-rejK4yMR1XZG1KyjDfmUOeS51mJmPTptH4fUtuV-3zANQN0G3n0HLmL7BA7krk4Y0l_D00gxHunLwoydIKUZ6XA3W0HI0c5Yo6_jRsjPYzaIUvyR8aK2wTJw4gFYlYLAOPRZ15xHjLarrc13JQ3SAbHuwXFVML_o57Ze4lMQ_5KZL7ZkYQgWzAk_37SxsL0OHFdtH3q4ZZhZYRZhugvzxip0BO35diWYY9ObfBBIazqlx2PETJTr3F0i2Y0c"/>
</div>
</div>
</div>
</header>
<!-- Main Map Canvas (Priority Visual) -->
<main class="relative h-screen w-full">
<!-- Interactive Map Placeholder -->
<div class="absolute inset-0 z-0">
<img alt="Map view of Najaf" class="w-full h-full object-cover brightness-95 contrast-110" data-alt="stylized birds-eye view map of a city with highlighted routes, subtle teal accents, and golden landmarks, clean aesthetic" data-location="Najaf, Iraq" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1YcFsDfBbhOMzdwBcdmvg0Z8kjWOZLuxcqfbN8poOw0UbluaB_f-dp7NRPatcYAgOeP-U7U5ISio8e245kS9SOrC_mW_Mn0LI5pLukkbZUw0GMkW5FzGGljx-QesXuTo3CPk7cWxnKzFCXEJOI65XiT5MzvgsuK_BasO45LDqgtswxRHvBjSuN0CmwQiPghtq3mWZNDeBdZlPy99h6SEtLITWT8YNlecCU3A4Y8dLKlgh1nWn5zDf1FR_z_rroyVYi-zxn_fqNYxt"/>
<!-- Route Overlay (Visual Representation) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-80" viewbox="0 0 1000 1000">
<path d="M200,600 Q400,550 600,400 T800,200" fill="none" stroke="#00666d" stroke-dasharray="12,8" stroke-width="8"></path>
<circle class="animate-pulse" cx="800" cy="200" fill="#3755c3" r="10"></circle>
</svg>
</div>
<!-- Floating Urgent Timer (Bento Style) -->
<div class="absolute top-24 left-6 z-10">
<div class="glass-panel rounded-[24px] p-4 flex flex-col gap-1 shadow-lg border border-white/40">
<span class="text-[10px] font-bold tracking-[0.2em] text-on-surface-variant uppercase">Time to Destination</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="text-3xl font-black font-manrope text-on-surface tracking-tighter">08:42</span>
</div>
<div class="mt-2 h-1 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3"></div>
</div>
</div>
</div>
<!-- Floating Destination Card (Asymmetric Layer) -->
<div class="absolute top-24 right-6 z-10 w-48">
<div class="glass-panel rounded-[24px] p-4 shadow-lg border border-white/40">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary">location_on</span>
<span class="text-xs font-bold text-on-surface">District: Al-Kufa</span>
</div>
<p class="text-[11px] text-on-surface-variant leading-relaxed">
                    Sector 4, Near Great Mosque. House 24.
                </p>
</div>
</div>
<!-- Bottom Sheet UI -->
<section class="absolute bottom-0 w-full z-40">
<div class="max-w-2xl mx-auto glass-panel rounded-t-[40px] shadow-[0_-20px_50px_rgba(0,102,109,0.1)] p-8">
<!-- Handle -->
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full mx-auto mb-8"></div>
<div class="flex items-start justify-between mb-8">
<div class="flex gap-4">
<div class="relative">
<img alt="Customer" class="w-16 h-16 rounded-2xl object-cover shadow-md" data-alt="portrait of a professional woman, friendly expression, natural lighting, high-end editorial feel" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGZEAGng-NOEPTrP6CMV6WmRgsFaBznXH6NDvKpncrHOGVkVtMCjQi-wVEE0ojhhapw4VQWop1b_M8FsIQAck7tEFgrfmej82jgo1zcoxKtOimG1h0tpype_HWU2ozFa9CQBLib-ymetgMxDbqBAhYfU_-qHupHjDIJL0OL4f0McI5y_Jpu0xAZdv1gb-GNWZvPj4yjkwH2GSN8-gq4EdhaglzpoId_53DVMxFsIiZQmN1HpGNZEZpA7AFdXBImEAXDhY5VPUFFi-g"/>
<div class="absolute -bottom-1 -right-1 bg-secondary w-6 h-6 rounded-full flex items-center justify-center border-2 border-white">
<span class="material-symbols-outlined text-[14px] text-white" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div>
<h2 class="text-2xl font-bold tracking-tight text-on-surface font-tajawal">Zainab Al-Hussaini</h2>
<p class="text-sm text-on-surface-variant font-medium mt-1">Premium Customer • 12 Orders</p>
</div>
</div>
<a class="w-14 h-14 bg-secondary-container flex items-center justify-center rounded-2xl active:scale-90 transition-transform" href="tel:+964000000000">
<span class="material-symbols-outlined text-on-secondary-container text-2xl" style="font-variation-settings: 'FILL' 1;">call</span>
</a>
</div>
<!-- Order Details Bento -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-surface-container-low p-4 rounded-[20px] flex flex-col gap-1">
<span class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">Package Details</span>
<span class="text-sm font-bold text-on-surface">3 Items • Fragile</span>
</div>
<div class="bg-surface-container-low p-4 rounded-[20px] flex flex-col gap-1">
<span class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">Payment</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">payments</span>
<span class="text-sm font-bold text-on-surface">COD: 45,000 IQD</span>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-5 rounded-[20px] font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined">check_circle</span>
                    Mark as Delivered
                </button>
</div>
</section>
</main>
<!-- Bottom Navigation Bar (Based on JSON - Suppression Logic Applied: Hidden during active task/tracking) -->
<!-- Navigation is suppressed here to prioritize the tracking "Canvas" as per the UX goal for focused journeys. -->
<!-- Secondary Overlay: Safety/Support FAB -->
<div class="fixed bottom-[420px] right-6 z-50 flex flex-col gap-4">
<button class="w-12 h-12 bg-white rounded-full shadow-xl flex items-center justify-center text-error active:scale-95 transition-transform border border-error/10">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">sos</span>
</button>
<button class="w-12 h-12 bg-white rounded-full shadow-xl flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
</body></html>
