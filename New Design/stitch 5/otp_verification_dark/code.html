<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-glass {
            background: rgba(46, 49, 50, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-inverse-surface text-on-primary-container font-manrope min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary/30">
<!-- Subtle Background Decor -->
<div class="fixed inset-0 overflow-hidden -z-10">
<div class="absolute -top-[10%] -right-[10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[60%] h-[60%] rounded-full bg-secondary/5 blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-md flex flex-col space-y-12">
<!-- Header & Brand Identity -->
<header class="flex flex-col items-center text-center space-y-6">
<div class="relative">
<!-- Iconic Representation (WhatsApp Context) -->
<div class="w-24 h-24 rounded-[32px] bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-2xl shadow-primary/20">
<span class="material-symbols-outlined text-5xl text-white" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</div>
<!-- Mini Pulsing Badge -->
<div class="absolute -bottom-1 -right-1 w-8 h-8 rounded-full bg-white dark:bg-inverse-surface flex items-center justify-center p-1 shadow-lg">
<div class="w-full h-full bg-[#25D366] rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<div class="space-y-3">
<h1 class="font-tajawal text-4xl font-extrabold tracking-tight text-white">
                    Verification
                </h1>
<p class="font-tajawal text-on-surface-variant text-lg px-4 leading-relaxed">
                    Sent to <span class="text-primary-fixed font-bold tracking-wider">+964 ••• ••• 72</span> via <span class="text-white font-medium">WhatsApp</span>
</p>
</div>
</header>
<!-- OTP Input Section -->
<section class="space-y-8">
<div class="grid grid-cols-6 gap-3 md:gap-4">
<!-- 6 Digit Boxes -->
<div class="aspect-square bg-white/5 border-b-2 border-primary-fixed/20 rounded-2xl flex items-center justify-center text-3xl font-bold text-white transition-all duration-300 focus-within:border-primary-fixed focus-within:bg-white/10 group">
<input class="w-full h-full bg-transparent border-none text-center focus:ring-0 font-tajawal" maxlength="1" placeholder="·" type="text"/>
</div>
<div class="aspect-square bg-white/5 border-b-2 border-primary-fixed/20 rounded-2xl flex items-center justify-center text-3xl font-bold text-white transition-all duration-300 focus-within:border-primary-fixed focus-within:bg-white/10">
<input class="w-full h-full bg-transparent border-none text-center focus:ring-0 font-tajawal" maxlength="1" placeholder="·" type="text"/>
</div>
<div class="aspect-square bg-white/5 border-b-2 border-primary-fixed/20 rounded-2xl flex items-center justify-center text-3xl font-bold text-white transition-all duration-300 focus-within:border-primary-fixed focus-within:bg-white/10">
<input class="w-full h-full bg-transparent border-none text-center focus:ring-0 font-tajawal" maxlength="1" placeholder="·" type="text"/>
</div>
<div class="aspect-square bg-white/5 border-b-2 border-primary-fixed/20 rounded-2xl flex items-center justify-center text-3xl font-bold text-white transition-all duration-300 focus-within:border-primary-fixed focus-within:bg-white/10">
<input class="w-full h-full bg-transparent border-none text-center focus:ring-0 font-tajawal" maxlength="1" placeholder="·" type="text"/>
</div>
<div class="aspect-square bg-white/5 border-b-2 border-primary-fixed/20 rounded-2xl flex items-center justify-center text-3xl font-bold text-white transition-all duration-300 focus-within:border-primary-fixed focus-within:bg-white/10">
<input class="w-full h-full bg-transparent border-none text-center focus:ring-0 font-tajawal" maxlength="1" placeholder="·" type="text"/>
</div>
<div class="aspect-square bg-white/5 border-b-2 border-primary-fixed/20 rounded-2xl flex items-center justify-center text-3xl font-bold text-white transition-all duration-300 focus-within:border-primary-fixed focus-within:bg-white/10">
<input class="w-full h-full bg-transparent border-none text-center focus:ring-0 font-tajawal" maxlength="1" placeholder="·" type="text"/>
</div>
</div>
<!-- Resend Timer -->
<div class="flex flex-col items-center space-y-4">
<div class="flex items-center space-x-2 px-6 py-2 rounded-full bg-white/5 text-sm font-medium">
<span class="text-on-surface-variant">Resend code in</span>
<span class="text-primary-fixed font-headline font-bold">00:48</span>
</div>
<button class="text-primary-fixed hover:text-white transition-colors font-tajawal font-medium underline underline-offset-8 decoration-primary-fixed/30 hover:decoration-white">
                    Did not receive the code?
                </button>
</div>
</section>
<!-- CTA Action -->
<footer class="pt-8">
<button class="w-full group relative flex items-center justify-center bg-gradient-to-r from-primary to-primary-container text-white py-5 px-8 rounded-2xl font-tajawal font-bold text-xl shadow-xl shadow-primary/20 active:scale-[0.98] transition-all">
<span>Confirm &amp; Continue</span>
<span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="mt-8 text-center text-on-surface-variant/60 font-tajawal text-sm px-10">
                By continuing, you agree to our terms and conditions of Hur Delivery service.
            </p>
</footer>
</main>
<!-- Support Link Floating -->
<div class="fixed bottom-10 left-0 right-0 flex justify-center">
<a class="flex items-center space-x-2 text-on-surface-variant/80 hover:text-white transition-colors bg-white/5 backdrop-blur-md px-5 py-3 rounded-2xl border border-white/5" href="#">
<span class="material-symbols-outlined text-[20px]" data-icon="support_agent">support_agent</span>
<span class="font-tajawal text-sm font-medium">Contact Hur Support</span>
</a>
</div>
<!-- Background Elements (The "No-Line" Rule - Tonal Shifts) -->
<div class="fixed top-0 left-0 w-full p-8 flex justify-between items-center pointer-events-none">
<div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center pointer-events-auto cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="arrow_back">arrow_back</span>
</div>
<div class="font-tajawal font-black tracking-tighter text-2xl text-primary-fixed opacity-40">
            HUR
        </div>
</div>
