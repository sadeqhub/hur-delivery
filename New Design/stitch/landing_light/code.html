<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "label": ["Tajawal", "Manrope", "sans-serif"]

                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Tajawal', 'Manrope', sans-serif;
            background-color: #f8f9fa;
        }
        .hero-gradient {
            background: linear-gradient(180deg, rgba(248, 249, 250, 0) 0%, rgba(248, 249, 250, 1) 90%);
        }
        .glass-pill {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #00666d 0%, #00818a 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="text-on-surface antialiased overflow-x-hidden">
<!-- Language Toggle Top Right -->
<div class="fixed top-12 right-6 z-50 flex items-center gap-2 px-3 py-1.5 glass-pill rounded-full border border-outline-variant/15">
<span class="text-[10px] font-bold text-primary tracking-widest uppercase">EN</span>
<div class="w-[1px] h-3 bg-outline-variant/30"></div>
<span class="text-[12px] font-bold text-on-surface-variant">عربي</span>
</div>
<!-- Main Container (iPhone 14 Pro aspect) -->
<main class="relative min-h-screen w-full max-w-[390px] mx-auto bg-surface overflow-hidden flex flex-col">
<!-- Hero Section -->
<section class="relative h-[530px] w-full flex-shrink-0">
<div class="absolute inset-0 w-full h-full">
<img class="w-full h-full object-cover" data-alt="Modern delivery motorbike rider navigating a sunny street in an Iraqi city with traditional architecture and golden sunlight flare" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCaLFO5E-A67CWIBRZ8JchlVM6FRh598s3RidC8zFSdfhiUNG19Y84r6LcIZvPtcDcs91IBb4m70ljzEca43cODt5J2JpLCG6cIG_8lEANL1FkEbE7hOALqDatPIsMt9fV1AueggFmGQX3bvS7mSCqDEW_z856VBY_2JZyKuYqvpVAiDUZQ_ek9G_FhqVTb64Md2i-PCofKzQPD59R4mTRFiOmc6O4D9RLthOOB3eA3pu44FpQTfE8n0ylsqE4e6VneRN0n6XPYHWN"/>
<div class="absolute inset-0 hero-gradient"></div>
</div>
<!-- Branding -->
<div class="absolute bottom-8 left-0 w-full px-8 flex flex-col items-center text-center">
<h1 class="text-teal-800 dark:text-teal-400 font-black text-4xl tracking-tighter mb-1">
                    Hur Delivery
                </h1>
<h2 class="text-3xl font-black text-on-surface tracking-tight mb-4">
                    حر دليفري
                </h2>
<div class="w-12 h-1 primary-gradient rounded-full"></div>
</div>
</section>
<!-- CTAs & Content -->
<section class="flex-grow px-8 pb-12 flex flex-col justify-end bg-surface">
<p class="text-on-surface-variant text-center mb-10 leading-relaxed text-sm font-medium px-4">
                The fastest logistics network serving the merchants and drivers of Najaf and Mosul.
            </p>
<div class="flex flex-col gap-4">
<!-- Merchant CTA -->
<button class="primary-gradient w-full py-5 rounded-[16px] shadow-lg shadow-primary/20 flex items-center justify-between px-8 active:scale-[0.98] transition-transform duration-200">
<div class="flex flex-col items-start">
<span class="text-white font-bold text-lg leading-none">I'm a Merchant</span>
<span class="text-on-primary-container/80 text-[13px] font-medium mt-1">أنا تاجر</span>
</div>
<span class="material-symbols-outlined text-white text-2xl rtl:rotate-180" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Driver CTA -->
<button class="bg-surface-container-high w-full py-5 rounded-[16px] flex items-center justify-between px-8 active:scale-[0.98] transition-transform duration-200">
<div class="flex flex-col items-start">
<span class="text-on-surface font-bold text-lg leading-none">I'm a Driver</span>
<span class="text-on-surface-variant text-[13px] font-medium mt-1">أنا سائق</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-2xl rtl:rotate-180" data-icon="delivery_dining">delivery_dining</span>
</button>
</div>
<!-- Login / Footer -->
<div class="mt-10 flex flex-col items-center gap-6">
<a class="group flex items-center gap-2" href="#">
<span class="text-on-surface-variant font-medium text-sm">Already using Hur?</span>
<span class="text-primary font-bold text-sm border-b-2 border-primary/20 group-active:border-primary transition-colors">Login here</span>
</a>
<div class="flex gap-4 opacity-40">
<div class="w-1 h-1 rounded-full bg-on-surface"></div>
<div class="w-1 h-1 rounded-full bg-on-surface"></div>
<div class="w-1 h-1 rounded-full bg-on-surface"></div>
</div>
</div>
</section>
<!-- Subtle Aesthetic Detail: Kinetic Arc -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 rounded-full bg-primary/5 blur-3xl pointer-events-none"></div>
<div class="absolute -top-12 -right-12 w-48 h-48 rounded-full bg-secondary/5 blur-3xl pointer-events-none"></div>
</main>
</body></html>
