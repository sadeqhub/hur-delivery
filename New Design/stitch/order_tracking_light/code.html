<!DOCTYPE html>

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .pulse-teal {
            box-shadow: 0 0 0 0 rgba(0, 102, 109, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 102, 109, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 102, 109, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 102, 109, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body select-none">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-sm flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="transition-all duration-300 active:scale-95 text-teal-700">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-xl font-bold text-teal-800 tracking-tight font-headline">Delivery Status</h1>
</div>
<button class="transition-all duration-300 active:scale-95 text-zinc-500 hover:bg-zinc-100/50 p-2 rounded-full">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<main class="relative h-screen w-full overflow-hidden">
<!-- Map View (60% height visually, but interactive behind bottom sheet) -->
<div class="absolute inset-0 h-full w-full">
<div class="relative w-full h-full bg-surface-container overflow-hidden">
<img alt="Detailed map of Najaf city streets with clear navigation paths" class="w-full h-full object-cover grayscale-[0.2] contrast-[0.9]" data-location="Najaf" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHSfxhc7aoIlTup79UEeIaJ08swJk2mkntjzMLxsx3_CdpTVdO5F1adaHGU41DJzVW1vd62o0ZPJG1T70jC4Vq07Q3wLZ6BwLBh2bqls5TZggVvK5NKTHpnlmptheOd9gYLfekyzzPEucpu6FZhm4R55XDfWH41CJhV02kWAYbAqybdVa0pRikkRDnPErS0XVuhdXfWFOzJFbq167yS3g2_Lns1PUFanefzfHSFupjguuCCcmIoioF8LktzQnPfKhiieUHi-Pgd6fv"/>

<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 400 800">
<path class="opacity-40" d="M 280 250 L 220 380 L 150 420 L 100 550" fill="none" stroke="#00666d" stroke-linecap="round" stroke-linejoin="round" stroke-width="6"></path>
<path d="M 280 250 L 220 380 L 150 420 L 100 550" fill="none" stroke="#00666d" stroke-dasharray="1 8" stroke-linecap="round" stroke-width="3"></path>
</svg>
<!-- Pickup Marker (Green) -->
<div class="absolute top-[230px] right-[100px] flex flex-col items-center">
<div class="bg-white p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined text-[#2E7D32] text-3xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<!-- Live Driver Marker (Pulsing Teal) -->
<div class="absolute top-[380px] right-[160px] flex flex-col items-center">
<div class="w-5 h-5 bg-primary rounded-full border-2 border-white pulse-teal relative z-10"></div>
<div class="mt-2 bg-white/90 backdrop-blur-md px-3 py-1 rounded-lg shadow-sm border border-outline-variant/20 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">motorcycle</span>
<span class="text-[10px] font-bold text-on-surface">DR-920</span>
</div>
</div>
<!-- Delivery Marker (Red) -->
<div class="absolute top-[540px] right-[280px] flex flex-col items-center">
<div class="bg-white p-1 rounded-full shadow-lg">
<span class="material-symbols-outlined text-error text-3xl" style="font-variation-settings: 'FILL' 1;">home_pin</span>
</div>
</div>
</div>
</div>
<!-- Sliding Bottom Sheet -->
<div class="absolute bottom-0 w-full bg-white/80 backdrop-blur-2xl rounded-t-[32px] shadow-[0_-8px_24px_rgba(0,0,0,0.06)] z-40 transition-transform duration-500">
<!-- Handle -->
<div class="flex justify-center py-3">
<div class="w-12 h-1.5 bg-surface-container-highest rounded-full"></div>
</div>
<div class="px-6 pb-28">
<!-- Status & ETA Header -->
<div class="flex justify-between items-end mb-8">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="inline-block w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-sm font-bold text-primary tracking-wide">ON THE WAY</span>
</div>
<h2 class="text-4xl font-extrabold text-on-surface tracking-tight font-headline">Arriving in 12 min</h2>
<p class="text-on-surface-variant text-sm mt-1">Delivery from <span class="font-bold">Al-Kafil Restaurant</span></p>
</div>
<!-- Progress Ring -->
<div class="relative flex items-center justify-center w-16 h-16">
<svg class="w-full h-full -rotate-90">
<circle class="text-surface-container-high" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="175.9" stroke-dashoffset="44" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<span class="absolute text-xs font-bold text-primary">65%</span>
</div>
</div>
<!-- Tonal Section: Driver & Vehicle Info -->
<div class="bg-surface-container-low rounded-[24px] p-5 flex flex-col gap-5">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Friendly professional delivery driver with a smile" class="w-14 h-14 rounded-2xl object-cover ring-2 ring-white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDokxArJKgs-VzjrLChu779TqXtd955u-Vu6p-zIeV94U6RqDTd3AaHCTx8fcpEXOToXKLeVzukNgEXpIvMP0nhW9Mdx7fKrTR5zVs7Edi2TBxiqYV9SXGNPpAnkG0ZNcYR3G15KNct_QtgWKFgz3Viugtlei4Ejg9sg2V3VCVW1fcQVZLkmIayLKKKb3yTTkqJ2xTw01VZzrWNaVeJjenawFl2fiRgko8QL8T7E9sHaPkIXBB9NiR2L1gnNE-LQhBZ5LC8z6h9iBih"/>
<div class="absolute -bottom-1 -right-1 bg-white p-1 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-xs text-primary" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<div>
<h3 class="font-bold text-lg text-on-surface">Ahmed Jassem</h3>
<div class="flex items-center gap-2">
<span class="bg-surface-container-highest text-[10px] px-2 py-0.5 rounded-full font-bold text-on-surface-variant tracking-wider">SILVER RANK</span>
<div class="flex items-center gap-0.5">
<span class="material-symbols-outlined text-sm text-amber-500" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-xs font-bold">4.9</span>
</div>
</div>
</div>
</div>
<div class="flex gap-2">
<button class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl text-primary shadow-sm transition-all active:scale-90 border border-outline-variant/10">
<span class="material-symbols-outlined">call</span>
</button>
</div>
</div>
<div class="flex items-center justify-between px-2">
<div class="flex items-center gap-3">
<div class="bg-white p-2 rounded-xl">
<span class="material-symbols-outlined text-primary">motorcycle</span>
</div>
<div>
<p class="text-[10px] text-on-surface-variant font-medium">VEHICLE</p>
<p class="text-sm font-bold text-on-surface">Bajaj Pulsar • White</p>
</div>
</div>
<div class="text-left">
<p class="text-[10px] text-on-surface-variant font-medium text-right">PLATE</p>
<p class="text-sm font-bold text-on-surface bg-surface-container-highest px-3 py-1 rounded-lg">NJF-8821</p>
</div>
</div>
</div>
<!-- Actions -->
<div class="grid grid-cols-1 gap-3 mt-6">
<button class="w-full bg-gradient-to-tr from-primary to-primary-container text-white py-4 rounded-[16px] font-bold text-lg shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined">chat_bubble</span>
                        Message Driver
                    </button>
<button class="w-full py-4 rounded-[16px] font-bold text-on-surface-variant hover:bg-surface-container-low transition-all">
                        Order Details
                    </button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Contextual Suppression Check: Active as Orders are primary focus) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-2xl rounded-t-3xl z-50 shadow-[0_-8px_24px_rgba(0,0,0,0.06)]">
<button class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined">home</span>
<span class="font-['Tajawal'] text-xs font-medium mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center bg-teal-50 text-teal-700 rounded-2xl px-5 py-2 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_shipping</span>
<span class="font-['Tajawal'] text-xs font-bold mt-1">Orders</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Tajawal'] text-xs font-medium mt-1">Wallet</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined">person</span>
<span class="font-['Tajawal'] text-xs font-medium mt-1">Profile</span>
</button>
</nav>
</body></html>
